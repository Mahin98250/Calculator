<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Apple Glass Calculator</title>
  <meta name="description" content="An elite Apple-inspired liquid glass calculator with morphism design. Now available as a downloadable app!" />
  <meta name="theme-color" content="#040712" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="./icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene">
    <div class="aurora aurora--one"></div>
    <div class="aurora aurora--two"></div>
    <div class="aurora aurora--three"></div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <section class="calculator" aria-label="Calculator">
      <div class="calculator__reflection"></div>
      <div class="calculator__glow" id="calculatorGlow"></div>

      <header class="calculator__top">
        <div>
          <p class="eyebrow">Liquid Glass</p>
          <h1>Calculator</h1>
        </div>
        <div class="mode-pill" id="modePill">Standard</div>
        <button id="install-button" class="install-button" style="display: none;" title="Download App">⬇ Download App</button>
      </header>

      <section class="display" aria-live="polite" aria-atomic="true">
        <div class="expression" id="expression">0</div>
        <div class="result" id="result">0</div>
      </section>

      <section class="keys" aria-label="Calculator keys">
        <button class="key key--utility liquid-key" data-action="clear" title="Clear">AC</button>
        <button class="key key--utility liquid-key" data-action="sign" title="Toggle sign">±</button>
        <button class="key key--utility liquid-key" data-action="percent" title="Percentage">%</button>
        <button class="key key--operator liquid-key" data-value="÷" title="Divide">÷</button>

        <button class="key liquid-key" data-value="7">7</button>
        <button class="key liquid-key" data-value="8">8</button>
        <button class="key liquid-key" data-value="9">9</button>
        <button class="key key--operator liquid-key" data-value="×" title="Multiply">×</button>

        <button class="key liquid-key" data-value="4">4</button>
        <button class="key liquid-key" data-value="5">5</button>
        <button class="key liquid-key" data-value="6">6</button>
        <button class="key key--operator liquid-key" data-value="−" title="Subtract">−</button>

        <button class="key liquid-key" data-value="1">1</button>
        <button class="key liquid-key" data-value="2">2</button>
        <button class="key liquid-key" data-value="3">3</button>
        <button class="key key--operator liquid-key" data-value="+" title="Add">+</button>

        <button class="key key--wide liquid-key" data-value="0">0</button>
        <button class="key liquid-key" data-value=".">.</button>
        <button class="key key--operator key--equal liquid-key" data-action="equals" title="Equals">=</button>
        <button class="key key--utility liquid-key" data-action="backspace" title="Backspace">⌫</button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="./js/pwa-install.js"></script>
</body>
</html>
